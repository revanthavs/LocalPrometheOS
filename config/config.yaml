lmstudio:
  base_url: "http://localhost:1234/v1"
  model: "openai/gpt-oss-20b"
  temperature: 0.2
  max_tokens: 1024
  timeout: 60

scheduler:
  timezone: "UTC"
  max_workers: 4

storage:
  db_path: "data/prometheos.db"
  results_dir: "data/results"

mcp:
  servers:
    - name: "local-core"
      transport: "stdio"
      command: ["python", "tools/mcp_server.py"]
      env: {}
      timeout: 30
  # Example HTTP MCP server:
  # - name: "remote-tools"
  #   transport: "http"
  #   url: "http://localhost:4000/mcp"
  #   timeout: 30

logging:
  level: "INFO"
  file: "data/prometheos.log"

memory:
  chroma_enabled: false
  persist_dir: "data/chroma"
  collection: "prometheos"

filesystem:
  # Directories the filesystem_read tool may access (relative to project root).
  # Add paths here to enable file reading. Empty = no access allowed.
  allowed_dirs:
    - "data"
    - "tasks"
